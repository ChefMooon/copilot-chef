name: Release Client

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-client-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Build, Validate & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build app
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package & publish Windows release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

